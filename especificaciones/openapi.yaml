          format: date-time
          example: "2026-07-07T09:00:00Z"
        variante_ids:
          type: array
          items:
            type: integer
          example: [5]
        # Campos de Transición de Estado y Cierre de Trámite
        estado:
          type: string
          enum: [RESERVADO, COMPLETO, INCOMPLETO, AUSENTE, CANCELADO]
          description: Nuevo estado operativo del turno.
          example: "CANCELADO"
        motivo_cancelacion:
          type: string
          description: Requerido si el estado se cambia a CANCELADO por parte de un Administrativo.
          example: "Ciudadano solicitó la baja por imposibilidad de asistencia."
        resultado_comentario:
          type: string
          description: Requerido si el estado se cambia a INCOMPLETO.
          example: "No presentó constancia de grupo sanguíneo."
        numero_carnet:
          type: string
          description: Requerido si el estado se cambia a COMPLETO y el trámite tiene emite_carnet = true.
          example: "CARNET-TR-129845"
        fecha_vencimiento_carnet:
          type: string
          format: date
          description: Requerido si el estado se cambia a COMPLETO y el trámite tiene emite_carnet = true.
          example: "2027-07-06"

